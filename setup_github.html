<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f14;--sur:#161920;--bdr:rgba(255,255,255,0.08);--txt:#e8eaf0;--mut:#7a8099;--acc:#5af7c8;--dan:#f76a6a;--r:12px}
body{background:var(--bg);color:var(--txt);font-family:"Noto Sans TC",sans-serif;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:760px;margin:0 auto}
h1{font-size:1.4rem;font-weight:700;letter-spacing:.08em;color:var(--acc);margin-bottom:.25rem}
.sub{color:var(--mut);font-size:.85rem;margin-bottom:2rem}
.sec{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem;margin-bottom:1.25rem}
.sec-title{font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:1rem}
label{display:block;font-size:.82rem;color:var(--mut);margin-bottom:.3rem;margin-top:.75rem}
input[type=text],input[type=number],select{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-family:inherit;font-size:.88rem;padding:.55rem .8rem;outline:none;transition:border-color .2s}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:rgba(90,247,200,.4)}
select option{background:#1e2130}
.tabs{display:flex;gap:.5rem;margin-bottom:1rem}
.tab{flex:1;padding:.55rem;border-radius:8px;border:1px solid var(--bdr);background:transparent;color:var(--mut);font-size:.82rem;cursor:pointer;transition:all .2s;text-align:center}
.tab.active{border-color:rgba(90,247,200,.5);color:var(--acc);background:rgba(90,247,200,.08)}
.range-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem}
.range-row input{flex:1}
.sep{color:var(--mut);flex-shrink:0}
.btn-x{background:none;border:none;color:var(--dan);cursor:pointer;font-size:1rem;opacity:.6;flex-shrink:0;padding:0 .25rem}
.btn-x:hover{opacity:1}
.btn-add{width:100%;padding:.45rem;border-radius:8px;border:1px dashed var(--bdr);background:transparent;color:var(--mut);font-size:.82rem;cursor:pointer;margin-top:.25rem;transition:all .2s}
.btn-add:hover{border-color:var(--acc);color:var(--acc)}
.prize-rows{display:flex;flex-direction:column;gap:.75rem}
.prow{display:grid;grid-template-columns:1fr 70px 36px;gap:.5rem;align-items:center;padding:.75rem;border:1px solid var(--bdr);border-radius:10px;background:rgba(0,0,0,.15)}
.picon{font-size:1.6rem;line-height:1}
.btn-gen{width:100%;padding:.9rem;border-radius:var(--r);border:1px solid rgba(90,247,200,.4);background:linear-gradient(135deg,rgba(90,247,200,.15),rgba(126,184,247,.15));color:var(--acc);font-size:1rem;font-weight:700;letter-spacing:.06em;cursor:pointer;margin-top:.5rem;transition:background .2s}
.btn-gen:hover{background:linear-gradient(135deg,rgba(90,247,200,.25),rgba(126,184,247,.25))}
.hidden{display:none}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr);background:rgba(255,255,255,.05);color:var(--txt);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;padding:0}
.qty-btn:hover{border-color:var(--acc);color:var(--acc);background:rgba(90,247,200,.08)}
.emoji-sel{background:rgba(0,0,0,.3);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:1.1rem;padding:.3rem .4rem;outline:none;cursor:pointer}
.preview-row{display:flex;gap:.4rem;margin-bottom:.4rem}
.preview-card{flex:1;min-width:0;border-radius:8px;padding:.5rem .4rem;text-align:center;font-size:.72rem;border:1px solid var(--bdr);background:rgba(0,0,0,.2);display:flex;flex-direction:column;align-items:center;gap:.3rem}
.preview-card.fluor{border-color:rgba(90,247,200,.3)}
.preview-card.fish{border-color:rgba(126,184,247,.3)}
.preview-card.quartz{border-color:rgba(247,200,106,.3)}
.preview-card img{width:36px;height:36px;object-fit:cover;border-radius:5px}
.preview-card .pv-icon{font-size:1.4rem;line-height:1}
.preview-card .pv-name{color:var(--mut);font-size:.68rem;word-break:break-all}
.preview-card .pv-handle{color:var(--acc);font-size:.7rem;font-weight:600}


  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --surface2: #1e2330;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --muted: #7a8299;
    --accent-fluor: #5af7c8;
    --accent-fish: #7eb8f7;
    --accent-gold: #f7c86a;
    --danger: #f76a6a;
    --radius: 12px;
    --font: 'Noto Sans TC', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 2rem;
    text-align: center;
  }

  h1 span {
    color: var(--text);
    font-weight: 700;
  }

  .top-row {
    max-width: 960px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    align-items: start;
    transition: grid-template-columns 0.3s ease;
  }

  .top-row.wide {
    grid-template-columns: 1fr;
  }

  #stage-row, #result-row {
    max-width: 960px;
    margin: 0 auto;
  }

  @media (max-width: 700px) {
    .top-row { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }

  .panel-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .count-badge {
    font-size: 0.72rem;
    font-weight: 700;
    background: var(--surface2);
    color: var(--accent-fluor);
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid rgba(90,247,200,0.2);
    letter-spacing: 0;
  }

  textarea {
    width: 100%;
    height: 260px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans TC', monospace;
    font-size: 0.8rem;
    line-height: 1.7;
    padding: 0.75rem;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--border2); }
  textarea::placeholder { color: var(--muted); font-size: 0.75rem; }

  .btn-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
  }

  button {
    flex: 1;
    padding: 0.6rem 0.5rem;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  button:hover { background: #2a3044; border-color: rgba(255,255,255,0.25); }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .btn-start {
    background: linear-gradient(135deg, rgba(90,247,200,0.15), rgba(126,184,247,0.15));
    border-color: rgba(90,247,200,0.4);
    color: var(--accent-fluor);
  }
  .btn-start:hover {
    background: linear-gradient(135deg, rgba(90,247,200,0.25), rgba(126,184,247,0.25));
  }

  .btn-clear {
    border-color: rgba(247,106,106,0.3);
    color: var(--danger);
    flex: 0 0 auto;
    padding: 0.6rem 0.9rem;
  }

  .prize-list {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    margin-bottom: 1rem;
  }

  .prize-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.55rem 0.75rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-size: 0.83rem;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .prize-item.current {
    border-color: rgba(90,247,200,0.5);
    background: rgba(90,247,200,0.06);
  }

  .prize-item.done {
    opacity: 0.45;
  }

  .prize-item.done .prize-name {
    text-decoration: line-through;
    color: var(--muted);
  }

  .prize-icon {
    font-size: 1rem;
    width: 22px;
    text-align: center;
  }

  .prize-name {
    flex: 1;
    font-weight: 500;
  }

  .prize-winner {
    font-size: 0.75rem;
    color: var(--accent-fluor);
    font-weight: 700;
  }

  .prize-item.fish-type .prize-winner {
    color: var(--accent-fish);
  }

  .stage {
    height: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1.5rem;
    border-radius: var(--radius);
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  .stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 120%, rgba(90,247,200,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .stage.fish-mode::before {
    background: radial-gradient(ellipse at 50% 120%, rgba(126,184,247,0.06) 0%, transparent 70%);
  }

  .stage-idle {
    color: var(--muted);
    font-size: 0.9rem;
  }

  .spin-icon {
    font-size: 3.5rem;
    animation: spin 0.4s linear infinite;
    display: block;
    margin-bottom: 0.5rem;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .spin-label {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .congrats-wrap {
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .congrats-emoji {
    font-size: 2.5rem;
    display: block;
    margin-bottom: 0.4rem;
  }

  .congrats-text {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }

  .congrats-handle {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent-fluor);
    letter-spacing: -0.01em;
  }

  .congrats-handle.fish-type {
    color: var(--accent-fish);
  }

  .congrats-prize {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  .results-area {
    display: none;
  }

  .results-area.visible {
    display: block;
  }

  .results-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  .result-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.83rem;
    animation: fadeSlide 0.4s ease both;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .result-row:last-child { border-bottom: none; }

  .result-icon { font-size: 0.95rem; width: 20px; text-align: center; }

  .result-prize {
    flex: 1;
    color: var(--muted);
  }

  .result-handle {
    font-weight: 700;
    color: var(--accent-fluor);
  }

  .result-handle.fish-type {
    color: var(--accent-fish);
  }

  .done-banner {
    text-align: center;
    padding: 0.75rem;
    margin-bottom: 1rem;
    background: rgba(90,247,200,0.06);
    border: 1px solid rgba(90,247,200,0.2);
    border-radius: 8px;
    font-size: 0.85rem;
    color: var(--accent-fluor);
    margin-bottom: 1rem;
    display: none;
  }

  .done-banner.visible { display: block; }

  .prize-thumb {
    width: 32px;
    height: 32px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .congrats-photo {
    width: 220px;
    height: 220px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 0.75rem;
    border: 2px solid rgba(255,255,255,0.15);
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  /* ── 結果卡片 ── */
  .winner-cards {
    display: none;
    flex-direction: column;
    gap: 1rem;
    margin-top: 0.5rem;
  }
  .winner-cards.visible { display: flex; }

  .winner-cards-row {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
  }

  .winner-card {
    flex: 1;
    max-width: 180px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 0.6rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    text-align: center;
  }

  .winner-card.fluor-type { border-color: rgba(90,247,200,0.35); }
  .winner-card.fish-type  { border-color: rgba(126,184,247,0.35); }
  .winner-card.quartz-type { border-color: rgba(247,200,106,0.35); }

  .winner-card-handle.fluor-type { color: var(--accent-fluor); }
  .winner-card-handle.fish-type { color: var(--accent-fish); }
  .winner-card-handle.quartz-type { color: var(--accent-gold); }

  .winner-card-name {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .winner-card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .winner-card-icon {
    font-size: 2.5rem;
    line-height: 1;
  }

  .winner-card-handle {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    word-break: break-all;
  }
  .winner-card-handle.fish-type { color: var(--accent-fish); }
  .winner-card-handle.fluor-type { color: var(--accent-fluor); }


  /* ── 匯入列 ── */
  .import-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
    align-items: center;
  }

  .btn-import {
    flex: 1;
    display: inline-block;
    text-align: center;
    padding: 0.45rem 0.75rem;
    border-radius: 8px;
    border: 1px solid rgba(90,247,200,0.4);
    color: var(--accent-fluor);
    font-size: 0.82rem;
    cursor: pointer;
    background: transparent;
    transition: background 0.2s;
    user-select: none;
  }
  .btn-import:hover { background: rgba(90,247,200,0.08); }

  .btn-clear-list {
    padding: 0.45rem 0.75rem;
    border-radius: 8px;
    border: 1px solid rgba(247,106,106,0.3);
    color: var(--danger);
    font-size: 0.82rem;
    cursor: pointer;
    background: transparent;
    transition: background 0.2s;
  }
  .btn-clear-list:hover { background: rgba(247,106,106,0.08); }

  /* ── 留言列表 ── */
  .comment-list {
    max-height: 260px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.6rem;
    background: rgba(0,0,0,0.2);
  }

  .comment-empty {
    padding: 0.75rem 1rem;
    color: var(--muted);
    font-size: 0.8rem;
    text-align: center;
  }

  .comment-item {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 0.45rem 0.65rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    line-height: 1.4;
  }
  .comment-item:last-child { border-bottom: none; }

  .comment-handle {
    color: var(--accent-fluor);
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .comment-text {
    color: var(--muted);
    flex: 1;
    word-break: break-all;
  }
  .comment-del {
    flex-shrink: 0;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0 0.2rem;
    line-height: 1;
    opacity: 0.5;
    transition: opacity 0.15s;
  }
  .comment-del:hover { opacity: 1; color: var(--danger); }


  /* ── 編號模式 ── */
  .number-ranges {
    padding: 0.75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.75rem;
    background: rgba(0,0,0,0.2);
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.8;
  }

  .range-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--text);
    font-size: 0.9rem;
  }

  .range-label {
    color: var(--accent-fluor);
    font-weight: 600;
    font-size: 1rem;
  }

  .range-hint {
    color: var(--muted);
    font-size: 0.82rem;
  }

  /* ── 手動輸入模式 ── */
  .btn-add-manual {
    width: 100%;
    margin-top: 0.4rem;
    margin-bottom: 0.5rem;
    padding: 0.4rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .btn-add-manual:hover {
    background: rgba(255,255,255,0.05);
    color: var(--text);
  }

  #manual-input {
    width: 100%;
    min-height: 80px;
    resize: vertical;
    margin-top: 0.5rem;
    background: rgba(0,0,0,.2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.82rem;
    padding: 0.5rem 0.75rem;
    font-family: inherit;
    box-sizing: border-box;
    pointer-events: auto;
    position: relative;
    z-index: 1;
  }
  #manual-input:focus { outline: none; border-color: rgba(90,247,200,0.4); }


#setup-page { display: block; }
#lottery-page { display: none; }
.btn-back {
  padding: 0.5rem 1.2rem;
  border-radius: 8px;
  border: 1px solid rgba(247,106,106,0.4);
  background: transparent;
  color: #f76a6a;
  font-size: 0.85rem;
  cursor: pointer;
  margin-top: 1.5rem;
  transition: background 0.2s;
}
.btn-back:hover { background: rgba(247,106,106,0.08); }
</style>
</head>
<body>

<!-- ══ 設定頁 ══ -->
<div id="setup-page">
<div class="wrap">
  <h1>&#9881;&#65039; 抽獎工具設定</h1>
  <p class="sub">設定完成後按「進入抽獎」直接進入抽獎。活動小工具製作 by <a href="https://www.instagram.com/drift.trove" target="_blank" style="color:var(--acc);text-decoration:none;border-bottom:1px solid rgba(90,247,200,0.3);transition:border-color .2s" onmouseover="this.style.borderColor='rgba(90,247,200,0.8)'" onmouseout="this.style.borderColor='rgba(90,247,200,0.3)'">Vein Rover 浪&#127754;藏</a>；若覺得實用請幫我們追蹤，謝謝&#128150;</p>

  <div class="sec">
    <div class="sec-title">活動標題</div>
    <input type="text" id="inp-title" placeholder="輸入抽獎活動名稱">
  </div>

  <div class="sec">
    <div class="sec-title">抽獎模式</div>
    <div class="tabs">
      <button class="tab active" id="tab-number" onclick="setMode('number')">&#128290; 編號模式</button>
      <button class="tab" id="tab-manual" onclick="setMode('manual')">&#9999;&#65039; 手動輸入</button>
    </div>
    <div id="num-settings">
      <div class="sec-title" style="margin-top:.5rem">號碼區間</div>
      <div id="range-list"></div>

<script>
// ══ 設定頁 ══

var mode = 'number';
var ranges = [{min:1, max:100}];
var prizes = [
  {name:'水晶',   emoji:'✨'},
  {name:'螢石',   emoji:'💠'},
  {name:'魚眼石', emoji:'🐟'}
];




function setMode(m) {
  mode = m;
  ['number','manual'].forEach(function(k) {
    var tab = document.getElementById('tab-'+k);
    if (tab) tab.classList.toggle('active', k===m);
  });
  document.getElementById('num-settings').classList.toggle('hidden', m!=='number');
  document.getElementById('other-settings').classList.toggle('hidden', m==='number');
}

function renderRanges() {
  var html = '';
  for (var i=0; i<ranges.length; i++) {
    html += '<div class="range-row">'
      + '<input type="number" value="' + ranges[i].min + '" min="1" data-idx="' + i + '" data-field="min" onchange="updateRange(this)">'
      + '<span class="sep">─</span>'
      + '<input type="number" value="' + ranges[i].max + '" min="1" data-idx="' + i + '" data-field="max" onchange="updateRange(this)">'
      + '<button class="btn-x" data-idx="' + i + '" onclick="removeRange(this)">✕</button>'
      + '</div>';
  }
  document.getElementById('range-list').innerHTML = html;
}

function updateRange(el) {
  var i = +el.dataset.idx;
  ranges[i][el.dataset.field] = +el.value;
}

function addRange() { ranges.push({min:1, max:100}); renderRanges(); }

function removeRange(el) {
  var i = +el.dataset.idx;
  if (ranges.length > 1) { ranges.splice(i,1); renderRanges(); }
}

function renderPrizes() {
  var emojiList = ['💠', '🐟', '✨', '💎', '🪨', '🌊', '🔮', '⭐', '🌙', '🌿', '🦋', '🐚', '🪸', '❄️', '🔥', '❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '🤎', '🩷', '🩵', '🩶'];
  var html = '';
  for (var i=0; i<prizes.length; i++) {
    var p = prizes[i];
    var icon = p.emoji || '💠';
    var opts = '';
    for (var e=0; e<emojiList.length; e++) {
      opts += '<option value="' + emojiList[e] + '"' + (icon===emojiList[e]?' selected':'') + '>' + emojiList[e] + '</option>';
    }
    html += '<div class="prow" id="pr-' + i + '">'
      + '<input type="text" value="' + p.name + '" placeholder="獎項名稱" data-idx="' + i + '" onchange="updateName(+this.dataset.idx, this.value)">'
      + '<select class="emoji-sel" data-idx="' + i + '" onchange="updateEmoji(+this.dataset.idx, this.value)">'
        + opts
      + '</select>'

      + '<button class="btn-x" data-idx="' + i + '" onclick="removePrize(+this.dataset.idx)">✕</button>'
      + '</div>';
  }
  document.getElementById('prize-rows').innerHTML = html;
  updatePrizeCount();
}

// 用 data-idx 避免 onclick 裡的引號衝突


function updateName(i, val) {
  prizes[i].name = val;
  updatePreview();
}

function removePrizeLast() {
  if (prizes.length <= 1) return;
  prizes.pop();
  renderPrizes();
  updatePreview();
}

function updatePrizeCount() {
  var el = document.getElementById('prize-count');
  if (el) el.textContent = prizes.length;
}

function addPrize() {
  prizes.push({name:'新獎項', emoji:'💠'});
  renderPrizes();
  updatePreview();
}

function removePrize(i) {
  if (prizes.length > 1) { prizes.splice(i,1); renderPrizes(); updatePreview(); }
}


function decodeTemplate() {
    var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for (var i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

function updateEmoji(i, val) {
  prizes[i].emoji = val;
  var icon = document.getElementById('pi-' + i);
  if (icon) icon.textContent = val;
  updatePreview();
}

function updatePreview() {
  var perRow = Math.max(1, parseInt(document.getElementById('cards-per-row').value) || 3);
  var container = document.getElementById('cards-preview');
  container.innerHTML = '';

  for (var i = 0; i < prizes.length; i += perRow) {
    var row = document.createElement('div');
    row.className = 'preview-row';
    for (var j = i; j < Math.min(i + perRow, prizes.length); j++) {
      var p = prizes[j];
      var icon = p.emoji || '💠';
      var hasImg = p.img && p.img.indexOf('data:') === 0;
      var card = document.createElement('div');
      card.className = 'preview-card ' + p.type;
      card.innerHTML = (hasImg
        ? '<img src="' + p.img + '" alt="">'
        : '<span class="pv-icon">' + icon + '</span>')
        + '<span class="pv-name">' + p.name + '</span>'
        + '<span class="pv-handle">得獎者</span>';
      row.appendChild(card);
    }
    container.appendChild(row);
  }
}



// ══ 抽獎邏輯 ══
let PRIZES = [];
let IMG = {};
let currentMode = 'number';
let numberRanges = [];
var cardsPerRow = 3;
let running = false;
let winners = [];
let currentPrize = 0;



// ── 全域資料 ──────────────────────────────────────────




 

 


function applyMode(mode) {
  currentMode = mode;
  document.getElementById('mode-number').style.display = mode === 'number' ? '' : 'none';
  document.getElementById('mode-manual').style.display = mode === 'manual' ? '' : 'none';
  document.getElementById('mode-import').style.display = mode === 'import' ? '' : 'none';
  document.getElementById('btn-import-json').style.display = mode === 'import' ? '' : 'none';
  document.getElementById('btn-clear-list').style.display = (mode === 'manual' || mode === 'import') ? '' : 'none';
  document.getElementById('count-badge').style.display = mode === 'number' ? 'none' : '';
  document.getElementById('panel-title-text').textContent = mode === 'number' ? '抽選範圍' : '留言名單';
}

function renderNumberRanges() {
  const el = document.getElementById('number-ranges');
  if (numberRanges.length === 0) {
    el.innerHTML = '<div class="range-hint">尚未載入設定</div>';
    return;
  }
  el.innerHTML = numberRanges.map(r =>
    `<div class="range-row"><span class="range-label">${r.min}</span><span style="color:var(--muted)"> ─ </span><span class="range-label">${r.max}</span><span class="range-hint" style="margin-left:0.5rem">（${r.max - r.min + 1} 個號碼）</span></div>`
  ).join('');
}


// ── 留言資料 ──────────────────────────────────────────
let commentData = [];
let manualData = [];

function stripMentions(str) {
  return str.replace(/@[\w.]+/g, '').replace(/\s+/g, ' ').trim();
}

// ── 編號模式：從 ranges 生成所有號碼 ──
function getAllNumbers() {
  const nums = [];
  for (const r of numberRanges) {
    for (let i = r.min; i <= r.max; i++) nums.push(i);
  }
  return nums;
}

// ── 手動輸入 ──
function addManualEntries() {
  var raw = document.getElementById('manual-input').value;
  var accounts = raw.split(/[,，]/).map(function(s) { return s.replace(/^@/, '').trim(); }).filter(function(s) { return s; });
  accounts.forEach(function(handle) {
    var exists = manualData.some(function(c) { return c.handle === handle; });
    if (!exists) manualData.push({handle: handle, text: ''});
  });
  document.getElementById('manual-input').value = '';
  renderManualList();
}

function deleteManual(idx) {
  manualData.splice(idx, 1);
  renderManualList();
}

function renderManualList() {
  const el = document.getElementById('comment-list-manual');
  if (manualData.length === 0) {
    el.innerHTML = '<div class="comment-empty">尚未輸入任何留言</div>';
  } else {
    el.innerHTML = manualData.map((c, i) => `
      <div class="comment-item">
        <span class="comment-handle">@${c.handle}</span>
        <span class="comment-text">${c.text || ''}</span>
        <button class="comment-del" onclick="deleteManual(${i})" title="刪除">✕</button>
      </div>`).join('');
  }
  document.getElementById('count-badge').textContent = manualData.length + ' 筆';
}

// ── 匯入模式 ──
function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const raw = JSON.parse(e.target.result);
      const items = Array.isArray(raw) ? raw : (raw.comments || raw.data || []);
      const newItems = items
        .filter(item => item.username && item.text)
        .map(item => ({
          id: item.id || (item.username + '|' + item.text),
          handle: item.username,
          text: stripMentions(item.text)
        }));
      const existingIds = new Set(commentData.map(c => c.id));
      newItems.forEach(ni => { if (!existingIds.has(ni.id)) commentData.push(ni); });
      if (currentMode === 'import') renderCommentList();
  else if (currentMode === 'manual') renderManualList();
  else renderNumberRanges();
    } catch(err) {
      alert('JSON 格式錯誤：' + err.message);
    }
    input.value = '';
  };
  reader.readAsText(file, 'utf-8');
}

function deleteComment(idx) {
  commentData.splice(idx, 1);
  if (currentMode === 'import') renderCommentList();
  else if (currentMode === 'manual') renderManualList();
  else renderNumberRanges();
}

function clearCommentList() {
  if (currentMode === 'import') {
    commentData = [];
    if (currentMode === 'import') renderCommentList();
  else if (currentMode === 'manual') renderManualList();
  else renderNumberRanges();
  } else if (currentMode === 'manual') {
    manualData = [];
    renderManualList();
  }
}

function renderCommentList() {
  const el = document.getElementById('comment-list');
  if (!el) return;
  if (commentData.length === 0) {
    el.innerHTML = '<div class="comment-empty" id="comment-empty">尚未匯入留言</div>';
  } else {
    el.innerHTML = commentData.map((c, i) => `
      <div class="comment-item">
        <span class="comment-handle">@${c.handle}</span>
        <span class="comment-text">${c.text || '（無文字）'}</span>
        <button class="comment-del" onclick="deleteComment(${i})" title="刪除">✕</button>
      </div>`).join('');
  }
  document.getElementById('count-badge').textContent = commentData.length + ' 筆';
}

// ── 統一取得參加者 ──
function getEntries() {
  if (currentMode === 'number') {
    const nums = getAllNumbers();
    return nums.map(n => ({ handle: String(n), comment: '' }));
  } else if (currentMode === 'manual') {
    return manualData.map(c => ({ handle: c.handle, comment: c.text }));
  } else {
    return commentData.map(c => ({ handle: c.handle, comment: c.text }));
  }
}

function getImg(key) {
  const v = IMG[key];
  return (v && v !== '') ? v : null;
}

function buildPrizeList() {
  const el = document.getElementById('prize-list');
  el.innerHTML = '';
  PRIZES.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'prize-item' + (p.type === 'fish' ? ' fish-type' : '');
    div.id = 'prize-item-' + i;
    div.innerHTML = `<span class="prize-icon">${p.icon}</span><span class="prize-name">${p.name}</span><span class="prize-winner" id="prize-winner-${i}"></span>`;
    el.appendChild(div);
  });
}

function setStageIdle() {
  const stage = document.getElementById('stage');
  stage.style.display = 'none';
  stage.className = 'stage';
  stage.innerHTML = '';
}

function setStageSpinning(prize) {
  const stage = document.getElementById('stage');
  stage.style.display = '';
  stage.className = 'stage' + (prize.type === 'fish' ? ' fish-mode' : '');
  stage.innerHTML = `<span class="spin-icon">${prize.icon}</span><div class="spin-label">抽選中⋯</div>`;
}

function setStageCongrats(prize, handle) {
  const stage = document.getElementById('stage');
  stage.style.display = '';
  stage.className = 'stage' + (prize.type === 'fish' ? ' fish-mode' : '');
  const handleClass = prize.type === 'fish' ? ' fish-type' : '';
  const imgSrc = getImg(prize.imgKey);
  const topEl = imgSrc
    ? `<img class="congrats-photo" src="${imgSrc}" alt="${prize.name}">`
    : `<span class="congrats-emoji">🎉</span>`;
  const isNumber = currentMode === 'number';
  const congrats = isNumber
    ? `<div class="congrats-text">恭喜編號第</div>
       <div class="congrats-handle${handleClass}">${handle} 號</div>
       <div class="congrats-text">的粉絲</div>`
    : `<div class="congrats-text">恭喜粉絲</div>
       <div class="congrats-handle${handleClass}">@${handle}</div>`;
  stage.innerHTML = `
    <div class="congrats-wrap">
      ${topEl}
      ${congrats}
      <div class="congrats-prize">抽中 ${prize.name}！</div>
    </div>`;
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}



function pick(entries, prize, excludeHandles) {
  const mentionsFish = e => e.comment.includes('魚眼石') || e.comment.includes('魚眼');

  // 螢石獎項：留言有提到「魚眼」或「魚眼石」者不得中獎
  let eligible = entries.filter(e => !excludeHandles.has(e.handle));
  if (prize.type === 'fluor') {
    const excluded = eligible.filter(mentionsFish);
    if (excluded.length > 0) {
      console.log(`[螢石隱藏規則] 以下帳號因留言含「魚眼」已排除：${excluded.map(e => '@' + e.handle).join(', ')}`);
    }
    eligible = eligible.filter(e => !mentionsFish(e));
  }

  if (eligible.length === 0) return null;

  const weighted = [];
  for (const e of eligible) {
    let w = 1;
    // 魚眼石獎項：留言含「魚眼」或「魚眼石」者權重 ×2
    if (prize.type === 'fish') {
      if (mentionsFish(e)) w = 2;
    }
    for (let i = 0; i < w; i++) weighted.push(e.handle);
  }

  return weighted[Math.floor(Math.random() * weighted.length)];
}

async function startLottery() {
  if (running) return;

  const entries = getEntries();
  if (entries.length === 0) {
    alert('請先匯入或輸入留言名單');
    return;
  }

  running = true;
  currentPrize = 0;
  winners = [];
  var backBtn = document.getElementById('btn-back-setup');
  if (backBtn) backBtn.style.display = 'none';

  document.getElementById('btn-start').disabled = true;
  document.getElementById('done-banner').classList.remove('visible');

  buildPrizeList();
  // 隱藏 B 欄，留言名單變寬
  document.getElementById('prize-list-section').style.display = 'none';
  document.getElementById('top-row').classList.add('wide');
  // 顯示舞台列，隱藏結果列
  document.getElementById('stage-row').style.display = '';
  document.getElementById('result-row').style.display = 'none';
  document.getElementById('winner-cards').classList.remove('visible');

  const excludeHandles = new Set();

  for (let i = 0; i < PRIZES.length; i++) {
    currentPrize = i;
    const prize = PRIZES[i];

    const prizeEl = document.getElementById('prize-item-' + i);
    if (prizeEl) prizeEl.classList.add('current');

    setStageSpinning(prize);
    await delay(1200);

    const handle = pick(entries, prize, excludeHandles);
    if (!handle) {
      setStageCongrats(prize, '（名單已用盡）');
      winners.push({ prize, handle: '（名單已用盡）' });
    } else {
      excludeHandles.add(handle);
      winners.push({ prize, handle });
      setStageCongrats(prize, handle);

      if (prizeEl) {
        const winnerEl = document.getElementById('prize-winner-' + i);
        if (winnerEl) winnerEl.textContent = '@' + handle;
      }
    }

    if (prizeEl) {
      prizeEl.classList.remove('current');
      prizeEl.classList.add('done');
    }

    await delay(1800);
  }

  setStageIdle();
  document.getElementById('stage-row').style.display = 'none';
  document.getElementById('result-row').style.display = '';
  document.getElementById('done-banner').classList.add('visible');
  var redrawBtn = document.getElementById('btn-redraw');
  if (redrawBtn) redrawBtn.style.display = '';
  renderWinnerCards(winners);

  running = false;
  document.getElementById('btn-start').disabled = false;
}

function renderWinnerCards(winners) {
  const container = document.getElementById('winner-cards');
  container.innerHTML = '';

  function makeCard(w) {
    const imgSrc = getImg(w.prize.imgKey);
    const typeClass = w.prize.type + '-type';
    const imgEl = imgSrc
      ? '<img src="' + imgSrc + '" alt="' + w.prize.name + '">'
      : '<div class="winner-card-icon">' + w.prize.icon + '</div>';
    const handleText = currentMode === 'number'
      ? '第 ' + w.handle + ' 號'
      : '@' + w.handle;
    const card = document.createElement('div');
    card.className = 'winner-card ' + typeClass;
    card.innerHTML = '<div class="winner-card-name">' + w.prize.name + '</div>'
      + imgEl
      + '<div class="winner-card-handle ' + typeClass + '">' + handleText + '</div>';
    return card;
  }

  // 按獎項順序，每行 cardsPerRow 張
  for (var i = 0; i < winners.length; i += cardsPerRow) {
    const row = document.createElement('div');
    row.className = 'winner-cards-row';
    for (var j = i; j < Math.min(i + cardsPerRow, winners.length); j++) {
      row.appendChild(makeCard(winners[j]));
    }
    container.appendChild(row);
  }

  container.style.display = 'flex';
  container.classList.add('visible');
}





function doReset() {
  running = false;
  winners = [];
  currentPrize = 0;

  // 恢復名單顯示（不清空內容）
  if (currentMode === 'import') renderCommentList();
  else if (currentMode === 'manual') renderManualList();
  else renderNumberRanges();

  // 恢復開始按鈕
  const btnStart = document.getElementById('btn-start');
  if (btnStart) btnStart.disabled = false;

  // 隱藏舞台與結果
  setStageIdle();
  const stageRow = document.getElementById('stage-row');
  if (stageRow) stageRow.style.display = 'none';
  const resultRow = document.getElementById('result-row');
  if (resultRow) resultRow.style.display = 'none';

  // 恢復版面
  const topRow = document.getElementById('top-row');
  if (topRow) topRow.classList.remove('wide');
  const prizeListSection = document.getElementById('prize-list-section');
  if (prizeListSection) prizeListSection.style.display = '';

  // 清掉完成提示與結果卡片
  const doneBanner = document.getElementById('done-banner');
  if (doneBanner) doneBanner.classList.remove('visible');
  const winnerCards = document.getElementById('winner-cards');
  if (winnerCards) { winnerCards.classList.remove('visible'); winnerCards.innerHTML = ''; winnerCards.style.display = 'none'; }

  buildPrizeList();
  var backBtn = document.getElementById('btn-back-setup');
  if (backBtn) backBtn.style.display = '';
  var redrawBtn = document.getElementById('btn-redraw');
  if (redrawBtn) redrawBtn.style.display = 'none';
}

function resetLottery() {
  doReset();
}

function clearAll() {
  doReset();
}

applyMode('number');
renderNumberRanges();
buildPrizeList();


// ══ 頁面切換 ══
function showPage(page) {
  document.getElementById('setup-page').style.display = page === 'setup' ? 'block' : 'none';
  document.getElementById('lottery-page').style.display = page === 'lottery' ? 'block' : 'none';
}

function startFromSetup() {
  // 防呆：沒有獎項
  if (!prizes || prizes.length === 0) {
    alert('請至少新增一個獎項！');
    return;
  }
  // 防呆：手動輸入模式沒有名單
  if (mode === 'manual' && manualData.length === 0) {
    alert('手動輸入模式請先輸入留言名單！');
    return;
  }
  // 防呆：編號模式沒有設定區間
  if (mode === 'number' && ranges.length === 0) {
    alert('編號模式請至少設定一個號碼區間！');
    return;
  }
  // 防呆：區間數值不合法
  if (mode === 'number') {
    for (var r=0; r<ranges.length; r++) {
      if (ranges[r].min > ranges[r].max) {
        alert('號碼區間的起始值不能大於結束值！');
        return;
      }
    }
  }
  var title = document.getElementById('inp-title').value.trim() || 'Giveaway';
  cardsPerRow = Math.max(1, parseInt(document.getElementById('cards-per-row').value) || 3);

  var count = 0;
  PRIZES = prizes.map(function(p) {
    count++;
    var key = 'p' + count;
    IMG[key] = '';
    return {name:p.name, type:'custom', icon:(p.emoji||'💠'), imgKey:key};
  });

  document.getElementById('lottery-title').textContent = title;
  currentMode = mode;
  numberRanges = ranges.slice();
  applyMode(mode);
  renderNumberRanges();
  buildPrizeList();
  doReset();
  var redrawBtn = document.getElementById('btn-redraw');
  if (redrawBtn) redrawBtn.style.display = 'none';
  showPage('lottery');
}

function backToSetup() {
  // 只有在抽獎未開始時才能直接返回
  if (running) {
    alert('抽獎進行中，無法返回設定頁面。');
    return;
  }
  showPage('setup');
  updatePreview();
}

function confirmBack() {
  if (confirm('回到設定頁面將清空本次抽獎結果，確定嗎？')) {
    doReset();
    showPage('setup');
    updatePreview();
  }
}

// ══ 初始化 ══
renderRanges();
renderPrizes();
updatePreview();
showPage('setup');
</script>
